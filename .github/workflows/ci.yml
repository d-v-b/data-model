name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: '3.12'
    - name: Install pre-commit
      run: pip install pre-commit
    - name: Run pre-commit
      run: pre-commit run --all-files

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.12', '3.13']

    steps:
    - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

    - name: Restore global uv cache
      id: cache-restore
      uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
      with:
        path: |
          ~/.cache/uv
          ~/.local/share/uv
          .venv
        key: uv-main-${{ hashFiles('uv.lock') }}
        restore-keys: |
          uv-main-

    - name: Install uv
      uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
      with:
        version: "0.8.4"
        python-version: "3.13"
        enable-cache: false

    - name: Install dependencies
      run: uv sync --group dev --group test

    - name: Run tests
      run: |
        uv run pytest tests/ -v --tb=short -m "not network" --cov=eopf_geozarr --cov-report=xml --cov-report=term-missing

    - name: Upload coverage to Codecov
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
      uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad # v5
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

    - name: Save uv caches
      if: steps.cache-restore.outputs.cache-hit != 'true'
      uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
      with:
        path: |
          ~/.cache/uv
          ~/.local/share/uv
          .venv
        key: uv-main-${{ hashFiles('uv.lock') }}

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
    - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: '3.12'

    - name: Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit pip-audit

    - name: Run bandit (static security analysis)
      run: bandit -r src/eopf_geozarr/ -f json -o bandit-report.json
      continue-on-error: true

    - name: Run pip-audit (dependency vulnerability scan)
      run: pip-audit -f json -o pip-audit-report.json
      continue-on-error: true

    - name: Write security summary
      if: always()
      env:
        REPO: ${{ github.repository }}
        RUN_ID: ${{ github.run_id }}
      run: python .github/scripts/security_summary.py

    - name: Post PR comment
      if: always() && github.event_name == 'pull_request'
      env:
        GH_TOKEN: ${{ github.token }}
        REPO: ${{ github.repository }}
        PR: ${{ github.event.pull_request.number }}
      run: |
        MARKER="<!-- security-scan-results -->"
        BODY=$(cat security-summary.md)

        COMMENT_ID=$(gh api "repos/${REPO}/issues/${PR}/comments" \
          --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" \
          | head -1)

        if [ -n "$COMMENT_ID" ]; then
          gh api "repos/${REPO}/issues/comments/${COMMENT_ID}" \
            -X PATCH -f body="${BODY}"
        else
          gh api "repos/${REPO}/issues/${PR}/comments" \
            -X POST -f body="${BODY}"
        fi

    - name: Fail if security issues found
      if: always()
      run: python .github/scripts/security_check.py

    - name: Upload security reports
      if: always()
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
      with:
        name: security-reports
        path: |
          bandit-report.json
          pip-audit-report.json
